<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Event HUD System</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- 🛠 CASUAL ADMIN WINDOW -->
    <div id="adminMenu" class="casual-window">
        <div class="casual-header">
            <span id="title_menuTitle">Event Notify</span>
            <div class="casual-close" onclick="closeAdminMenu()">×</div>
        </div>
        <div class="casual-content">
            <label id="title_labelName">Event Name:</label>
            <input type="text" id="inputName" placeholder="X">

            <!-- 🔄 NEU: Reihe für Datum & Uhrzeit nebeneinander -->
            <div class="admin-row">
                <div class="admin-col">
                    <label id="title_labelDate">Datum:</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="admin-col">
                    <label id="title_labelTime">Uhrzeit:</label>
                    <input type="time" id="inputTime">
                </div>
            </div>

            <label id="title_labelDiscord">Discord Nachrichtenlink:</label>
            <input type="text" id="inputDiscord" placeholder="https://discord.gg...">

            <label id="title_labelNote">Globale Info (optional):</label>
            <input type="text" id="inputNote" placeholder="Global Command, Standort, reminder...">

            <label id="title_labelDispatch">Dispatch Nachricht (optional):</label>
            <input type="text" id="inputDispatch" placeholder="Event-Ort nicht beachten oder Szenario Einsatz">

            <!-- 🔄 NEU: Ein einzelner, dynamischer Toggle-Button -->
            <button onclick="toggleEventState()" class="action-btn toggle-btn start-btn" id="btnToggle">Ankündigung einblenden</button>
            <button onclick="closeAdminMenu()" class="action-btn close-btn" id="title_btnClose">Menü schließen</button>
        </div>
    </div>

    <!-- 📢 PUBLIC EVENT HUD -->
    <div id="eventInfo" class="design-hud">
        <div id="card">
            <div id="header">📢 EVENT ANKÜNDIGUNG</div>
            <div id="body">
                <div id="name">Event-Name</div>
                <div id="dateTime">am <span id="date">00.00.0000</span> um <span id="time">00:00 Uhr</span></div>
                <div id="countdown">Lädt Countdown...</div>
                <div id="playerCount">👥 Teilnehmer: 0</div>
                <div id="note"></div> 
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
